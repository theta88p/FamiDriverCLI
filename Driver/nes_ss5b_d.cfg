MEMORY {
    ZP:         start = $0000, size = $0100, type = rw, define = yes;
    HEADER:     start = $0000, size = $0010, file = %O, fill = yes;
    ROM0:       start = $8000, size = $4000, file = %O, fill = yes;
    ROM1:       start = $c000, size = $3eb0, file = %O, fill = yes, define = yes;
    ROM2:       start = $feb0, size = $014a, file = %O, fill = yes;
    ROMV:       start = $fffa, size = $0006, file = %O, fill = yes;
    ROMC:       start = $0000, size = $2000, file = %O, fill = yes;
    STACK:      start = $0100, size = $0200, type = rw, define = yes;
    RAM:        start = $0200, size = $0600, type = rw, define = yes;
}

SEGMENTS {
    HEADER:     load = HEADER, type = ro;
    CODE:       load = ROM0,   type = ro,  define = yes;
    MUSDATA:    load = ROM0,   type = ro,  define = yes;
    PCMDATA:    load = ROM1,   type = ro,  define = yes;
    STARTUP:    load = ROM2,   type = ro,  define = yes;
    LOWCODE:    load = ROM2,   type = ro,  optional = yes;
    INIT:       load = ROM2,   type = ro,  define = yes, optional = yes;
    RODATA:     load = ROM2,   type = ro,  define = yes;
    VECTORS:    load = ROMV,   type = rw;
    CHARS:      load = ROMC,   type = rw;
    BSS:        load = RAM,    type = bss, define = yes;
    ZEROPAGE:   load = ZP,     type = zp;
}
