MEMORY {
    ZP:         start = $0000, size = $0100, type = rw, define = yes;

    PRG:        start = $6000, size = $6000, file = "dsp_fds_code.bin", fill = no, define = yes;
    DPCM:       start = $c000, size = $1ffa, file = "", fill = yes, define = yes;
    VECTOR:     start = $dffa, size = $0006, file = "dsp_fds_vector.bin", fill = yes;
    CHR:        start = $0000, size = $2000, file = "dsp_fds_chr.bin", fill = yes;

    STACK:      start = $0100, size = $0200, type = rw, define = yes;
    RAM:        start = $0200, size = $0600, type = rw, define = yes;
}

SEGMENTS {
    STARTUP:    load = PRG,    type = ro,  define = yes;
    LOWCODE:    load = PRG,    type = ro,                optional = yes;
    INIT:       load = PRG,    type = ro,  define = yes, optional = yes;
    CODE:       load = PRG,    type = ro,  define = yes;
    RODATA:     load = PRG,    type = ro,  define = yes;
    MUSDATA:    load = PRG,    type = ro,  define = yes;
    PCMDATA:    load = DPCM,   type = ro,  define = yes;
    VECTORS:    load = VECTOR, type = rw;
    CHARS:      load = CHR,    type = rw;
    BSS:        load = RAM,    type = bss, define = yes;
    ZEROPAGE:   load = ZP,     type = zp;
}
